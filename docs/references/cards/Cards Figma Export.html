<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Cards de Produto · para Figma — Grupo Real</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,500;0,600;0,700;1,600;1,700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #F4F1EA; }
  * { box-sizing: border-box; }
  #root { width: max-content; }
</style>
<!-- thumbnail for the bundler (splash + no-JS fallback) -->
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <rect width="120" height="120" rx="20" fill="#ED4A05"/>
    <rect x="40" y="34" width="44" height="58" rx="7" fill="#ffffff" transform="rotate(-7 62 63)"/>
    <rect x="34" y="30" width="44" height="58" rx="7" fill="#FFE3CC"/>
    <rect x="34" y="30" width="44" height="26" rx="7" fill="#B23C0E"/>
  </svg>
</template>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="hifi-core.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { PALETTES, PRODUCTS } = window.HF;
  const pal = PALETTES[2]; // Laranja Forte
  const RATES = ['R$ 33,60', 'R$ 28,90', 'R$ 41,10', 'R$ 36,70', 'R$ 39,50'];

  function CardsFrame() {
    return (
      <div style={{ padding: 56, display: 'flex', flexDirection: 'column', gap: 30 }}>
        <div>
          <div className="hf-disp" style={{ fontFamily: "'Bitter', serif", fontWeight: 700, fontSize: 30, color: '#2B2A27' }}>Cards de Produto — Grupo Real</div>
          <div className="hf-body" style={{ fontFamily: "'Source Sans 3', sans-serif", fontSize: 15, color: '#7a756c', marginTop: 4 }}>5 cards · 340 × 452 px cada · paleta Laranja Forte · fontes Bitter + Source Sans 3</div>
        </div>
        <div style={{ display: 'flex', gap: 36, alignItems: 'flex-start' }}>
          {PRODUCTS.map((p, i) => (
            <div key={i} style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <div className="hf-body" style={{ fontFamily: "'Source Sans 3', sans-serif", fontSize: 13, fontWeight: 700, letterSpacing: '.06em', textTransform: 'uppercase', color: '#E8501A' }}>Card {i + 1} · {p.tag}</div>
              <Card p={p} pal={pal} cta="Consultar já" rate={RATES[i]} />
            </div>
          ))}
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<CardsFrame />);
</script>
</body>
</html>
